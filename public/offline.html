<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Village Foodie Kitchen — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #f8fafc; color: #1e293b; text-align: center; padding: 24px;
    }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.9rem; line-height: 1.6; max-width: 280px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; }
    .status { display: flex; align-items: center; margin-top: 24px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>No connection</h1>
  <p>The KDS is trying to reconnect. Orders placed before you went offline are still shown.</p>
  <div class="status">
    <span class="dot"></span>
    <span>Waiting for connection…</span>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload())
  </script>
</body>
</html>
