name: HatchGrab Truck Schedule Scrape

on:
  schedule:
    # FIXED daily slots PER TRUCK TIMEZONE: 08:00 / 14:00 / 20:00 in each truck's OWN local time.
    # GitHub cron is UTC-only + DST-unaware, so we fire at every UTC hour that could be one of those local
    # slots for the timezones in use, and run-scraper.js's isScrapeSlotNow() lets only the truck whose
    # LOCAL hour is 08/14/20 actually scrape (DST handled via Intl, no UTC drift). The hours below cover
    # the UK year-round: BST(UTC+1) → 07/13/19 UTC = 08/14/20 local; GMT(UTC+0) → 08/14/20 UTC = local.
    # → adding a truck in a NEW timezone? Add that zone's local-08/14/20 UTC hours here; the per-truck gate
    #   does the rest. (Or switch to '0 * * * *' hourly for zero cron maintenance, at higher CI cost.)
    # The per-truck dueByFrequency gate (5h interval for 3×/day) then caps how many of the 3 slots each
    # truck takes: 3×/day → all three, 2×/day → 08+20, 1×/day → one.
    - cron: '0 7,8,13,14,19,20 * * *'
  workflow_dispatch:
    inputs:
      scrape_truck_id:
        description: 'HatchGrab truck ID to scrape (leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # puppeteer's own Chrome downloader is broken on this runner (install exits 0, writes ~0 bytes,
    # no `chrome` binary ever appears — even with a clean cache). Install Chrome via this action
    # instead and point puppeteer at it with PUPPETEER_EXECUTABLE_PATH on the Run Scraper step.
    - name: Install Chrome
      id: setup-chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    # npm ci honours the committed lock (puppeteer/puppeteer-core 24.38.0). SKIP puppeteer's
    # postinstall Chrome download entirely — we never want puppeteer downloading anything; the
    # browser comes from the Install Chrome step above.
    - name: Install dependencies
      run: npm ci
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'

    - name: Run Scraper
      env:
        # Pass B only — HatchGrab-linked trucks. Pass A (global discovery) stays on daily_scrape.yml.
        SCRAPE_MODE: hatchgrab
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        HATCHGRAB_API_URL: ${{ secrets.HATCHGRAB_API_URL }}
        INBOUND_SCHEDULE_SECRET: ${{ secrets.INBOUND_SCHEDULE_SECRET }}
        SCRAPE_TRUCK_ID: ${{ github.event.inputs.scrape_truck_id }}
        PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      run: node scripts/run-scraper.js
