name: HatchGrab Truck Schedule Scrape

on:
  schedule:
    # HOURLY fire + a per-truck DUE-WINDOW gate (run-scraper.js isDueByLog). The old exact-hour design
    # (fire at UTC hours mapping to local 08/14/20, and only scrape when the truck's LOCAL hour == a slot)
    # broke against GitHub's cron jitter: scheduled runs land late (the discovery cron '0 6' arrives ~09:2x),
    # so the exact-hour match almost never held and scheduled scraping silently stopped (06-28 regression).
    # Now we fire every hour and let each truck scrape only when it's DUE (no run in scraper_run_log within
    # ~24/scrape_times_per_day − 1h; 3×/day → 7h) → naturally ~3×/day, tolerant of any single fire being
    # dropped/delayed. Most hourly fires find nothing due and exit before launching Chrome (cheap no-op).
    # Timezone-agnostic (the window is duration-based, not clock-based); no per-zone cron maintenance.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      scrape_truck_id:
        description: 'HatchGrab truck ID to scrape (leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # puppeteer's own Chrome downloader is broken on this runner (install exits 0, writes ~0 bytes,
    # no `chrome` binary ever appears — even with a clean cache). Install Chrome via this action
    # instead and point puppeteer at it with PUPPETEER_EXECUTABLE_PATH on the Run Scraper step.
    - name: Install Chrome
      id: setup-chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    # npm ci honours the committed lock (puppeteer/puppeteer-core 24.38.0). SKIP puppeteer's
    # postinstall Chrome download entirely — we never want puppeteer downloading anything; the
    # browser comes from the Install Chrome step above.
    - name: Install dependencies
      run: npm ci
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'

    - name: Run Scraper
      env:
        # Pass B only — HatchGrab-linked trucks. Pass A (global discovery) stays on daily_scrape.yml.
        SCRAPE_MODE: hatchgrab
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        HATCHGRAB_API_URL: ${{ secrets.HATCHGRAB_API_URL }}
        INBOUND_SCHEDULE_SECRET: ${{ secrets.INBOUND_SCHEDULE_SECRET }}
        SCRAPE_TRUCK_ID: ${{ github.event.inputs.scrape_truck_id }}
        PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      run: node scripts/run-scraper.js
