name: Daily Food Truck Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scrape_truck_id:
        description: 'HatchGrab truck ID to scrape (leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # npm ci (not npm install) so the committed lock (puppeteer/puppeteer-core 24.38.0) is
    # honoured deterministically and puppeteer's postinstall downloads the EXACT pinned Chrome
    # build (146.0.7680.31) that launch() requests — into ~/.cache/puppeteer.
    - name: Install Dependencies
      run: npm ci

    # NO cache-clear. The old `rm -rf ~/.cache/puppeteer/chrome` ran AFTER the postinstall and
    # DELETED the exact pinned Chrome it had just installed; the explicit install below (bare
    # `install chrome` = latest-stable) then put a build that does NOT match the pinned revision
    # launch wants, so the run failed with "Could not find Chrome (146.0.7680.31)" (CI logs:
    # steps Install Dependencies/Install Puppeteer Chrome both SUCCEEDED, only Run Scraper/launch
    # failed). Removing the clear preserves the postinstall's pinned build for launch.

    # Safety net only: runs against an already-populated cache (postinstall provided the pinned
    # build). If it adds a different build the pinned one is still present, so launch resolves it.
    - name: Install Puppeteer Chrome
      run: npx puppeteer browsers install chrome

    - name: Run Scraper
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        HATCHGRAB_API_URL: ${{ secrets.HATCHGRAB_API_URL }}
        INBOUND_SCHEDULE_SECRET: ${{ secrets.INBOUND_SCHEDULE_SECRET }}
        SCRAPE_TRUCK_ID: ${{ github.event.inputs.scrape_truck_id }}
      run: node scripts/run-scraper.js
