name: Daily Food Truck Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scrape_truck_id:
        description: 'HatchGrab truck ID to scrape (leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Dependencies
      run: npm install

    - name: Clear Puppeteer cache
      run: rm -rf ~/.cache/puppeteer/chrome

    - name: Install Puppeteer Chrome
      run: npx puppeteer browsers install chrome

    - name: Run Scraper
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        HATCHGRAB_API_URL: ${{ secrets.HATCHGRAB_API_URL }}
        INBOUND_SCHEDULE_SECRET: ${{ secrets.INBOUND_SCHEDULE_SECRET }}
        SCRAPE_TRUCK_ID: ${{ github.event.inputs.scrape_truck_id }}
      run: node scripts/run-scraper.js
