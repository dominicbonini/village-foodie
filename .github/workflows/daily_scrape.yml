name: Daily Food Truck Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set Puppeteer cache dir
      run: echo "PUPPETEER_CACHE_DIR=$RUNNER_TOOL_CACHE/puppeteer" >> $GITHUB_ENV

    - name: Install Dependencies
      run: npm install

    - name: Install Puppeteer Chrome
      run: npx puppeteer browsers install chrome@stable

    - name: Run Scraper
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        PUPPETEER_CACHE_DIR: ${{ env.PUPPETEER_CACHE_DIR }}
      run: node scripts/run-scraper.js
